<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>发布精灵 - 创作中心</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+SC:wght@400;700&display=swap');
        body { font-family: 'Inter', 'Noto Sans SC', -apple-system, sans-serif; background-color: #f5f5f7; color: #1d1d1f; }
        .apple-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
        .preview-container #MdWechat { all: initial; font-family: inherit; }
        .cloak { display: none !important; }
        /* 自定义滚动条 - 苹果风格 */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d1d1d6; border-radius: 10px; border: 2px solid transparent; background-clip: content-box; }
    </style>
</head>
<body class="min-h-screen">

    <div id="authModal" class="cloak fixed inset-0 bg-black/30 backdrop-blur-md z-[100] flex items-center justify-center">
        <div class="bg-white/90 p-8 rounded-[24px] shadow-2xl w-[360px] text-center border border-white/20">
            <div class="w-16 h-16 bg-blue-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white shadow-lg">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h2 id="authTitle" class="text-xl font-semibold mb-1">需要验证</h2>
            <p id="authDesc" class="text-sm text-gray-500 mb-6">请输入您的访问密码</p>
            <input type="password" id="authPassword" class="w-full px-4 py-3 bg-gray-100 rounded-xl border-none focus:ring-2 focus:ring-blue-500 mb-4 transition-all" placeholder="密码" onkeypress="if(event.key === 'Enter') handleAuth()">
            <button id="authBtn" onclick="handleAuth()" class="w-full bg-blue-600 text-white py-3 rounded-xl font-semibold hover:bg-blue-700 active:scale-95 transition-all">进入</button>
        </div>
    </div>

    <div id="imageModal" class="cloak fixed inset-0 bg-black/90 z-[110] flex items-center justify-center cursor-zoom-out" onclick="this.classList.add('cloak')">
        <img id="modalImg" src="" class="max-w-[90%] max-h-[90%] object-contain rounded-lg shadow-2xl">
    </div>

    <div id="mainApp" class="cloak max-w-[1200px] mx-auto px-6 py-10">
        <header class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-6">
            <div>
                <h1 class="text-3xl font-bold tracking-tight">发布精灵</h1>
                <p class="text-gray-500 text-sm mt-1">WeChat Article Publishing System</p>
            </div>
            
            <div class="apple-glass p-2 rounded-2xl border border-white/40 shadow-sm flex items-center gap-3">
                <div id="coverPreviewContainer" class="cloak flex items-center gap-2 pl-2">
                    <img id="coverPreviewImg" src="" class="w-10 h-10 object-cover rounded-lg cursor-pointer hover:opacity-80 transition" onclick="openFullscreenCover()">
                    <div class="h-6 w-[1px] bg-gray-300"></div>
                </div>
                <div class="flex items-center gap-2">
                    <input type="file" id="coverFileInput" accept="image/*" class="hidden">
                    <button onclick="document.getElementById('coverFileInput').click()" class="text-xs font-medium px-3 py-2 rounded-lg hover:bg-gray-100 transition">选择封面</button>
                    <button onclick="handleCoverUpload(event)" id="coverUploadBtn" class="bg-black text-white text-xs font-semibold px-4 py-2 rounded-lg hover:bg-gray-800 active:scale-95 transition">上传并固化</button>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
            <div class="md:col-span-2">
                <input id="articleTitle" type="text" placeholder="输入文章标题..." class="w-full px-5 py-4 bg-white rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition-all font-medium">
            </div>
            <div class="relative">
                <select id="themeSelect" onchange="handleConvert()" class="w-full px-5 py-4 bg-white rounded-2xl border border-gray-200 appearance-none focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm cursor-pointer font-medium">
                    <option value="default">典雅紫 (Default)</option>
                    <option value="apple">极简科技 (Apple)</option>
                    <option value="notion">优雅手帐 (Notion)</option>
                    <option value="vibrant">炫彩现代 (Vibrant)</option>
                    <option value="blue">学术科技 (Blue)</option>
                    <option value="green">清新森林 (Green)</option>
                    <option value="dark">静谧深蓝 (Dark)</option>
                </select>
                <div class="absolute right-5 top-1/2 -translate-y-1/2 pointer-events-none text-gray-400">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[65vh]">
            <div class="flex flex-col gap-4">
                <div class="flex-1 bg-white rounded-[24px] shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                    <div class="px-5 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                        <span class="text-[11px] font-bold uppercase tracking-tighter text-gray-400">Markdown 文本</span>
                    </div>
                    <textarea id="inputText" class="flex-1 p-6 focus:outline-none resize-none text-sm leading-relaxed" placeholder="在此输入 Markdown 正文..."></textarea>
                </div>
                <button onclick="handleConvert()" class="bg-blue-600 text-white py-4 rounded-2xl font-bold hover:bg-blue-700 active:scale-[0.98] transition-all shadow-lg shadow-blue-200">
                    转换并预览
                </button>
            </div>

            <div class="flex flex-col gap-4">
                <div class="flex-1 bg-white rounded-[24px] shadow-sm border border-gray-200 overflow-hidden flex flex-col">
                    <div class="px-5 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                        <span class="text-[11px] font-bold uppercase tracking-tighter text-gray-400">微信手机端预览</span>
                        <div id="coverStatus" class="text-[10px] text-gray-400 font-mono">Ready</div>
                    </div>
                    <div id="previewArea" class="flex-1 overflow-y-auto p-4 preview-container">
                        <div class="text-gray-300 italic text-center mt-32 text-sm">转换后的内容将在此回显</div>
                    </div>
                </div>
                <button id="uploadBtn" onclick="handleUpload()" disabled class="bg-emerald-600 text-white py-4 rounded-2xl font-bold hover:bg-emerald-700 disabled:bg-gray-200 disabled:text-gray-400 active:scale-[0.98] transition-all shadow-lg shadow-emerald-100">
                    发布至公众号草稿箱
                </button>
            </div>
        </div>
    </div>

    <script>
        let currentHtml = "";
        let currentDigest = "";
        let isSetupMode = false;

        // --- 1. 鉴权逻辑 ---
        document.addEventListener("DOMContentLoaded", async () => {
            try {
                const res = await fetch('/api/cover');
                if (res.status === 401) {
                    const data = await res.json();
                    document.getElementById('authModal').classList.remove('cloak');
                    if (data.code === 'SETUP_REQUIRED') {
                        isSetupMode = true;
                        document.getElementById('authTitle').innerText = "首次配置";
                        document.getElementById('authDesc').innerText = "请为您的 KV 数据库设置一个管理密码";
                    }
                } else {
                    initSystem();
                }
            } catch (e) { console.error(e); }
        });

        async function handleAuth() {
            const pwd = document.getElementById('authPassword').value;
            if(!pwd) return;
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pwd, isSetup: isSetupMode })
            });
            if (res.ok) {
                document.getElementById('authModal').classList.add('cloak');
                initSystem();
            } else { alert("验证失败"); }
        }

        // --- 2. 系统核心逻辑 ---
        async function initSystem() {
            document.getElementById('mainApp').classList.remove('cloak');
            // 初始化封面
            const res = await fetch('/api/cover');
            const data = await res.json();
            if (data.success && data.media_id) {
                localStorage.setItem("fixed_thumb_media_id", data.media_id);
                const imgUrl = '/api/cover_image?t=' + Date.now();
                document.getElementById('coverPreviewImg').src = imgUrl;
                document.getElementById('modalImg').src = imgUrl;
                document.getElementById('coverPreviewContainer').classList.remove('cloak');
                document.getElementById("coverStatus").innerText = "ID: " + data.media_id.substring(0, 8);
            }
        }

        function openFullscreenCover() { document.getElementById('imageModal').classList.remove('cloak'); }

        async function handleCoverUpload(event) {
            const fileInput = document.getElementById('coverFileInput');
            const file = fileInput.files[0];
            if (!file) return alert("请先选择图片");
            
            const btn = document.getElementById('coverUploadBtn');
            btn.innerText = "...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch('/api/upload_cover', { method: 'POST', body: formData });
                const result = await res.json();
                if (result.success) {
                    await initSystem();
                    alert("封面已同步至云端 KV");
                }
            } catch (e) { alert("上传失败"); }
            finally { btn.innerText = "上传并固化"; btn.disabled = false; }
        }

        // --- 核心修改：主题切换即时刷新 ---
        async function handleConvert() {
            const text = document.getElementById('inputText').value;
            const theme = document.getElementById('themeSelect').value;
            if(!text) return;
            
            const preview = document.getElementById('previewArea');
            const uploadBtn = document.getElementById('uploadBtn');
            
            // 按钮状态反馈
            uploadBtn.innerText = "正在转换主题...";

            try {
                const res = await fetch('/api/convert', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ text, theme })
                });
                const data = await res.json();

                if (data.title) {
                    document.getElementById('articleTitle').value = data.title;
                }
                
                currentHtml = data.html;
                currentDigest = data.digest;
                
                preview.innerHTML = currentHtml;
                // 背景色同步
                const sectionStyle = preview.querySelector('section')?.getAttribute('style') || "";
                const bgColorMatch = sectionStyle.match(/background(?:-color)?:\s*([^;]+)/);
                if(bgColorMatch) preview.style.backgroundColor = bgColorMatch[1];

                preview.scrollTop = 0;
                uploadBtn.disabled = false;
                uploadBtn.innerText = "发送至公众号草稿箱";
            } catch (e) {
                alert("转换失败");
            }
        }

        async function handleUpload() {
            const title = document.getElementById('articleTitle').value;
            if(!title) return alert("请输入标题");
            
            const btn = document.getElementById('uploadBtn');
            const originalText = btn.innerText;
            btn.innerText = "正在同步至微信...";
            btn.disabled = true;

            const fixedThumbId = localStorage.getItem("fixed_thumb_media_id");
            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        html: currentHtml,
                        title: title,
                        digest: currentDigest,
                        thumb_media_id: fixedThumbId 
                    })
                });
                const result = await res.json();
                if(result.success) alert("同步成功！");
                else alert("同步失败: " + result.error);
            } catch (e) { alert("错误: " + e.message); }
            finally { btn.innerText = originalText; btn.disabled = false; }
        }
    </script>
</body>
</html>
