<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>微信文章 - 创作助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap');
        body { font-family: 'Noto Serif SC', serif; }
        .preview-container #MdWechat { all: initial; font-family: inherit; }
    </style>
</head>
<body class="bg-[#faf8f5] min-h-screen text-[#333]">
    <div class="max-w-6xl mx-auto px-6 py-10">
        <header class="flex justify-between items-center mb-10 border-b border-stone-200 pb-6">
            <div>
                <h1 class="text-2xl font-bold text-stone-800 tracking-wider">发布精灵</h1>
                <p class="text-sm text-stone-500 mt-1">微信文章发布系统</p>
            </div>

            
            <div class="w-full flex justify-between items-center mt-6 pt-4 border-t border-stone-200">
                <div class="flex items-center gap-3">
                    <label class="text-xs text-stone-400 font-bold uppercase tracking-widest">自定义封面:</label>
                    <input type="file" id="coverFileInput" accept="image/png, image/jpeg, image/jpg" class="text-sm text-stone-500 file:mr-4 file:py-1.5 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-stone-100 file:text-stone-700 hover:file:bg-stone-200 cursor-pointer">
                    <button onclick="handleCoverUpload(event)" class="px-4 py-1.5 bg-stone-800 text-stone-100 rounded-lg text-xs hover:bg-stone-700 transition-all font-bold tracking-wider">上传并固化</button>
                </div>
                <div id="coverStatus" class="text-xs text-stone-400 font-mono bg-white px-3 py-1 rounded-md border border-stone-100">当前使用默认封面</div>
            </div>

            
            <div class="flex gap-4 items-center">
                
                <div class="flex items-center gap-1">
                    <a href="https://www.cloudflare-cn.com/ips/" target="_blank" class="text-[15px] text-stone-300 hover:text-stone-500 transition-colors" title="查看 Cloudflare IP 白名单">(IP)</a>
                </div>
                
                <label class="text-xs text-stone-400 font-bold uppercase tracking-widest">主题:</label>
                <select id="themeSelect" onchange="handleConvert()" class="px-3 py-1.5 bg-white border border-stone-200 rounded-lg text-sm focus:outline-none focus:ring-1 focus:ring-stone-400 cursor-pointer">
                    <option value="default">典雅紫 (Default)</option>
                    <option value="apple">极简科技 (Apple)</option>
                    <option value="notion">优雅手帐 (Notion)</option>
                    <option value="vibrant">炫彩现代 (Vibrant)</option>
                    <option value="blue">学术科技 (Blue)</option>
                    <option value="green">清新森林 (Green)</option>
                    <option value="dark">静谧深蓝 (Dark)</option>
                </select>
            </div>
            <div class="flex gap-4">
                <input id="articleTitle" type="text" placeholder="输入文章标题..." class="px-4 py-2 bg-white border border-stone-200 rounded-lg focus:outline-none focus:ring-1 focus:ring-stone-400 w-64">
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 h-[70vh]">
            <div class="flex flex-col gap-4">
                <label class="text-xs uppercase tracking-widest text-stone-400 font-bold">Markdown 文本</label>
                <textarea id="inputText" class="flex-1 p-6 bg-white border border-stone-200 rounded-xl shadow-sm focus:outline-none focus:border-stone-400 leading-relaxed resize-none" placeholder="在此输入正文..."></textarea>
                <button onclick="handleConvert()" class="bg-stone-800 text-stone-100 py-3 rounded-xl hover:bg-stone-700 transition-all font-bold tracking-widest">
                    点击转换 HTML
                </button>
            </div>

            <div class="flex flex-col gap-4">
                <label class="text-xs uppercase tracking-widest text-stone-400 font-bold">微信预览回显</label>
                <div id="previewArea" class="flex-1 bg-white border border-stone-200 rounded-xl shadow-sm overflow-y-auto p-4 preview-container">
                    <div class="text-stone-300 italic text-center mt-20">转换后的内容将在此渲染</div>
                </div>
                <button id="uploadBtn" onclick="handleUpload()" disabled class="bg-emerald-700 text-white py-3 rounded-xl hover:bg-emerald-800 disabled:bg-stone-200 disabled:text-stone-400 transition-all font-bold tracking-widest">
                    发送至公众号草稿箱
                </button>
            </div>

             <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" 
                class="fixed bottom-10 right-4 bg-white border border-stone-200 p-3 rounded-full shadow-xl hover:bg-stone-50 transition-all z-50 flex items-center justify-center group"
                title="返回顶部">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-stone-500 group-hover:text-stone-800" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18" />
                </svg>
            </button>
        
        </div>
    </div>


    <script>
// 确保这两个变量在最外层定义，防止未定义报错
let currentHtml = "";
let currentDigest = "";

async function handleConvert() {
    // 🚀 终极测试点：只要点击按钮，必须弹出这句话！
    alert("转换功能已触发！如果看到这句话，说明新代码已经生效了！");

    const textElement = document.getElementById('inputText');
    if (!textElement) return alert("❌ 找不到输入框！");
    
    const fullText = textElement.value;
    if (!fullText) return alert("请输入内容再转换！");

    const theme = document.getElementById('themeSelect').value;
    
    try {
        const res = await fetch('/api/convert', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text: fullText, theme })
        });
        
        const data = await res.json();
        
        // 核心回填逻辑与弹窗验证
        if (data.title) {
            const titleInput = document.getElementById('articleTitle');
            if (titleInput) {
                titleInput.value = data.title;
                alert("✅ 成功抓取标题：" + data.title);
            } else {
                alert("❌ 错误：在网页里找不到 ID 为 articleTitle 的输入框");
            }
        } else {
            alert("⚠️ 后端没有返回标题！可能是 Cloudflare 后端代码还没部署完。");
        }
        
        // 渲染正文
        currentHtml = data.html || "";
        currentDigest = data.digest || ""; 
        
        const preview = document.getElementById('previewArea');
        if (preview) {
            preview.innerHTML = currentHtml;
            preview.scrollTop = 0; 
        }
        
        const uploadBtn = document.getElementById('uploadBtn');
        if (uploadBtn) uploadBtn.disabled = false;

    } catch (err) {
        alert("❌ 彻底报错了：" + err.message);
    }
}

        async function handleUpload() {
            const title = document.getElementById('articleTitle').value;
            if(!title) return alert("请先输入文章标题");
            
            const btn = document.getElementById('uploadBtn');
            const originalText = btn.innerText;
            btn.innerText = "正在同步至微信...";
            btn.disabled = true;

            // 读取固化在本地的封面 ID
            const fixedThumbId = localStorage.getItem("fixed_thumb_media_id");

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        html: currentHtml,
                        title: title,
                        digest: currentDigest,
                        thumb_media_id: fixedThumbId // 新增：将封面 ID 传给后端
                    })
                });
                const result = await res.json();
                if(result.success) {
                    alert("同步成功！请前往公众号后台查看。");
                } else {
                    alert("同步失败: " + result.error);
                }
            } catch (e) {
                alert("请求出错: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }

        // 监听输入框变化也能即时转换（可选）
    async function handleConvert() {
        const text = document.getElementById('inputText').value;
        const theme = document.getElementById('themeSelect').value;
        if(!text) return;
        
        const res = await fetch('/api/convert', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ text, theme })
        });
        const data = await res.json();
        currentHtml = data.html;
        
        const preview = document.getElementById('previewArea');
        preview.innerHTML = currentHtml;
        // 同步预览区域的背景色，让预览更真实
        const sectionStyle = preview.querySelector('section')?.getAttribute('style') || "";
        const bgColorMatch = sectionStyle.match(/background(?:-color)?:\s*([^;]+)/);
        if(bgColorMatch) preview.style.backgroundColor = bgColorMatch[1];

        // 自动滚动到预览区域顶部，方便查看
        preview.scrollTop = 0;
        document.getElementById('uploadBtn').disabled = false;
    }

    // --- 新增：页面加载时恢复本地固化的封面 ID ---
        document.addEventListener("DOMContentLoaded", () => {
            const savedThumbId = localStorage.getItem("fixed_thumb_media_id");
            if (savedThumbId) {
                document.getElementById("coverStatus").innerHTML = `<span class="text-emerald-600">已固化封面 ID:</span> ${savedThumbId.substring(0, 15)}...`;
            }
        });

        // --- 新增：处理封面上传 ---
        async function handleCoverUpload(event) {
            const fileInput = document.getElementById('coverFileInput');
            const file = fileInput.files[0];
            if (!file) return alert("请先选择一张图片作为封面");

            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "正在上传至微信...";
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', file);

            try {
                const res = await fetch('/api/upload_cover', {
                    method: 'POST',
                    body: formData // Fetch 会自动设置正确的 multipart/form-data Boundary
                });
                const result = await res.json();
                
                if (result.success) {
                    // 将上传成功返回的 media_id 固化在本地
                    localStorage.setItem("fixed_thumb_media_id", result.media_id);
                    document.getElementById("coverStatus").innerHTML = `<span class="text-emerald-600">已固化封面 ID:</span> ${result.media_id.substring(0, 15)}...`;
                    alert("封面上传成功！已固化，后续发送将默认使用该封面。");
                } else {
                    alert("封面上传失败: " + result.error);
                }
            } catch (e) {
                alert("请求出错: " + e.message);
            } finally {
                btn.innerText = originalText;
                btn.disabled = false;
            }
        }    
    </script>
</body>
</html>
